<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click Game</title>
<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    cursor: pointer;
  }
  #counter {
    font-size: 40px;
    text-align: center;
  }
  iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }
</style>
</head>
<body onclick="handleClick()">

<div id="counter">Click me 50 times</div>

<iframe id="video"
  src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0"
  allow="autoplay; fullscreen">
</iframe>

<script>
let clicks = 50;

function handleClick() {
  clicks--;
  document.getElementById("counter").innerText = "Clicks left: " + clicks;

  if (clicks === 20) {
    document.getElementById("video").style.display = "block";
  }

  if (clicks <= 0) {
    document.getElementById("counter").innerText = "Done!";
  }
}
</script>

</body>
</html>
