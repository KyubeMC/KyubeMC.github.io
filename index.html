<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click Me</title>
<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    font-size: 40px;
    font-family: Arial;
    cursor: pointer;
  }

  #video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }
</style>
</head>
<body onclick="playVideo()">

<div id="text">Click me!</div>

<iframe id="video" allow="autoplay; fullscreen"></iframe>

<script>
function playVideo() {
  const iframe = document.getElementById("video");
  const text = document.getElementById("text");

  text.style.display = "none";
  iframe.style.display = "block";

  iframe.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0";
}
</script>

</body>
</html>
